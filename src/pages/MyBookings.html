<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('pages/_styles') ?>
</head>
<body>
  <div class="container">
    <?!= include('pages/_header') ?>

    <? var u = getCurrentUser(); if (u) { ?>
    <div style="text-align:right;margin-top:-14px;margin-bottom:20px;padding-right:8px">
      <span class="user-banner">
        <span class="u-dot"></span>
        <span class="u-email"><?= u ?></span>
        <button class="u-change" onclick="changeUser()">Change user</button>
      </span>
    </div>
    <? } else { ?>
    <div class="card" style="margin-bottom:20px;background:rgba(255,176,32,.06);border:1px solid rgba(255,176,32,.25)">
      <p style="color:var(--amber);text-align:center;margin:0;font-weight:600">Sign in with your Google account to view your bookings.</p>
      <div style="text-align:center;margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="signIn()">Sign in with Google</button>
      </div>
    </div>
    <? } ?>

    <a class="back-link" href="javascript:void(0)" onclick="goBack()">← Back</a>

    <div class="card" id="bookingList">
      <h2>My <span>Bookings</span> · UGS</h2>
      <div id="loadingMsg" class="text-center" style="padding:24px">
        <span class="spinner"></span> <span class="text-muted">Loading your bookings...</span>
      </div>
      <div id="bookingContainer" style="display:none"></div>
      <div id="emptyMsg" class="empty-state" style="display:none">
        <div class="icon">&#x1F4C5;</div>
        <p>No bookings found for this account.</p>
      </div>
    </div>

    <div id="cancelModal" style="display:none;position:fixed;inset:0;background:rgba(5,6,13,.88);z-index:100;align-items:center;justify-content:center">
      <div class="card" style="max-width:400px;width:90%;text-align:center">
        <h2>Cancel <span>Booking</span></h2>
        <p style="color:var(--muted);margin-bottom:4px" id="cancelModalId"></p>
        <p style="color:var(--red);font-size:12px;margin-bottom:16px">This will free the slot. Both you and admin will be notified.</p>
        <div class="row row-end" style="justify-content:center;gap:10px">
          <button class="btn btn-ghost btn-sm" onclick="closeCancelModal()">Keep Booking</button>
          <button class="btn btn-danger btn-sm" id="confirmCancelBtn" onclick="doCancel()">Cancel Booking</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var allBookings = [];
    var selectedId = null;

    function init() {
      google.script.run
        .withSuccessHandler(function(bookings) {
          document.getElementById('loadingMsg').style.display = 'none';
          allBookings = bookings || [];
          if (allBookings.length === 0) {
            document.getElementById('emptyMsg').style.display = 'block';
            return;
          }
          document.getElementById('bookingContainer').style.display = 'block';
          renderList();
        })
        .withFailureHandler(function(err) {
          document.getElementById('loadingMsg').innerHTML = '<span class="text-muted">Error: ' + err.message + '</span>';
        })
        .getMyBookings();
    }

    function renderList() {
      var deployUrl = '<?!= getDeploymentUrl() ?>';
      var html = '<table><thead><tr><th>ID</th><th>Room</th><th>Date</th><th>Time</th><th>Status</th><th>Action</th></tr></thead><tbody>';
      for (var i = 0; i < allBookings.length; i++) {
        var b = allBookings[i];
        var actionBtn = '—';
        if (b.status === 'Approved') {
          var fbUrl = deployUrl + '?page=feedback&bid=' + encodeURIComponent(b.bookingId);
          actionBtn = '<a class="btn btn-ghost btn-sm" style="color:var(--green);border-color:rgba(57,255,20,.25)" href="' + fbUrl + '">Feedback</a>';
        }
        if (b.status === 'Pending' || b.status === 'Approved') {
          actionBtn += ' <button class="btn btn-danger btn-sm" onclick="openCancelModal(\'' + esc(b.bookingId) + '\',\'' + esc(b.status) + '\')">Cancel</button>';
        }
        html += '<tr>' +
          '<td class="mono">' + esc(b.bookingId) + '</td>' +
          '<td>' + esc(b.room) + '</td>' +
          '<td>' + esc(b.date) + '</td>' +
          '<td class="mono">' + esc(b.startTime) + '–' + esc(b.endTime) + '</td>' +
          '<td><span class="pill ' + b.status.toLowerCase() + '">' + esc(b.status) + '</span></td>' +
          '<td>' + actionBtn + '</td>' +
        '</tr>';
      }
      html += '</tbody></table>';
      document.getElementById('bookingContainer').innerHTML = html;
    }

    function openCancelModal(bookingId, status) {
      selectedId = bookingId;
      var tag = status === 'Approved' ? ' (currently approved)' : '';
      document.getElementById('cancelModalId').innerHTML = '<span class="mono" style="color:var(--text);font-weight:600">' + esc(bookingId) + '</span>' + tag;
      document.getElementById('cancelModal').style.display = 'flex';
    }

    function closeCancelModal() {
      document.getElementById('cancelModal').style.display = 'none';
      selectedId = null;
    }

    function doCancel() {
      if (!selectedId) return;
      var btn = document.getElementById('confirmCancelBtn');
      btn.disabled = true;
      btn.textContent = 'Cancelling...';
      google.script.run
        .withSuccessHandler(function(r) {
          btn.disabled = false;
          btn.textContent = 'Cancel Booking';
          closeCancelModal();
          if (r.success) {
            showToast('Booking cancelled. Email sent to you and admin.', 'success');
            init();
          } else { showToast(r.message, 'error'); }
        })
        .withFailureHandler(function(err) {
          btn.disabled = false;
          btn.textContent = 'Cancel Booking';
          showToast('Error: ' + err.message, 'error');
        })
        .cancelMyBooking(selectedId, '<?!= getCurrentUser() ?>');
    }

    function changeUser() {
      doSignIn();
    }

    function signIn() {
      doSignIn();
    }

    function doSignIn() {
      google.script.run
        .withSuccessHandler(function(authUrl) {
          if (authUrl) {
            window.top.location.href = authUrl;
          } else {
            window.top.location.href = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent('<?!= getDeploymentUrl() ?>?page=my');
          }
        })
        .withFailureHandler(function() {
          window.top.location.href = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent('<?!= getDeploymentUrl() ?>?page=my');
        })
        .getAuthUrl();
    }

    function goBack() {
      window.top.location.href = '<?!= getDeploymentUrl() ?>';
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showToast(msg, type) {
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 5000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
