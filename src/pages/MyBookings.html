<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('pages/_styles') ?>
</head>
<body>
  <div class="container">
    <?!= include('pages/_header') ?>

    <div class="card" id="searchCard">
      <h2>My <span>Bookings</span></h2>
      <p class="text-muted mb-20">Look up your booking by email and booking ID.</p>
      <div class="form-grid">
        <div>
          <label for="lookupEmail">Email *</label>
          <input type="email" id="lookupEmail" placeholder="your@email.com" required>
        </div>
        <div>
          <label for="lookupId">Booking ID *</label>
          <input type="text" id="lookupId" placeholder="IC-YYYYMMDD-XXXX" class="text-mono" required>
        </div>
      </div>
      <div class="mt-20">
        <button class="btn btn-primary" onclick="lookupBooking()">Look Up</button>
        <span class="text-muted" style="margin-left:12px">You can cancel only <em>Pending</em> bookings.</span>
      </div>
      <div id="lookupStatus" class="text-muted mt-12" style="display:none"></div>
    </div>

    <div class="card" id="resultCard" style="display:none">
      <h2>Booking <span>Details</span></h2>
      <div id="bookingDetails"></div>
      <div id="cancelSection" class="mt-20" style="display:none">
        <button class="btn btn-danger" onclick="cancelBooking()">Cancel This Booking</button>
      </div>
    </div>
  </div>

  <script>
    var currentBooking = null;

    function lookupBooking() {
      var email = document.getElementById('lookupEmail').value.trim();
      var id = document.getElementById('lookupId').value.trim();
      if (!email || !id) { showToast('Please enter both email and booking ID.', 'error'); return; }
      document.getElementById('lookupStatus').style.display = 'block';
      document.getElementById('lookupStatus').innerHTML = '<span class="spinner"></span> Looking up...';

      google.script.run
        .withSuccessHandler(function(b) {
          document.getElementById('lookupStatus').style.display = 'none';
          if (!b) {
            showToast('Booking not found.', 'error');
            document.getElementById('resultCard').style.display = 'none';
            return;
          }
          if (b.email.toLowerCase() !== email.toLowerCase()) {
            showToast('Email does not match the booking record.', 'error');
            document.getElementById('resultCard').style.display = 'none';
            return;
          }
          currentBooking = b;
          renderBooking(b);
        })
        .withFailureHandler(function(err) {
          document.getElementById('lookupStatus').style.display = 'block';
          document.getElementById('lookupStatus').textContent = 'Error: ' + err.message;
        })
        .getBookingById(id);
    }

    function renderBooking(b) {
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('cancelSection').style.display = b.status === 'Pending' ? 'block' : 'none';

      var dAt = b.decisionAt ? new Date(b.decisionAt).toLocaleString('en-MY', {timeZone:'Asia/Kuala_Lumpur'}) : '';
      var html = '<table><tbody>' +
        '<tr><th>Booking ID</th><td class="mono">' + esc(b.bookingId) + '</td></tr>' +
        '<tr><th>Status</th><td><span class="pill ' + b.status.toLowerCase() + '">' + esc(b.status) + '</span></td></tr>' +
        '<tr><th>Name</th><td>' + esc(b.name) + '</td></tr>' +
        '<tr><th>Office</th><td>' + esc(b.office || '—') + '</td></tr>' +
        '<tr><th>Tel</th><td>' + esc(b.tel) + '</td></tr>' +
        '<tr><th>Email</th><td>' + esc(b.email) + '</td></tr>' +
        '<tr><th>Room</th><td>' + esc(b.room) + '</td></tr>' +
        '<tr><th>Date</th><td>' + esc(b.date) + '</td></tr>' +
        '<tr><th>Time</th><td>' + esc(b.startTime) + ' – ' + esc(b.endTime) + '</td></tr>' +
        '<tr><th>Purpose</th><td>' + esc(b.purpose) + '</td></tr>';
      if (b.notes) html += '<tr><th>Notes</th><td>' + esc(b.notes) + '</td></tr>';
      if (b.decisionBy) html += '<tr><th>Decided By</th><td>' + esc(b.decisionBy) + '</td></tr>';
      if (b.decisionAt) html += '<tr><th>Decided At</th><td>' + esc(dAt) + '</td></tr>';
      html += '</tbody></table>';
      document.getElementById('bookingDetails').innerHTML = html;
    }

    function cancelBooking() {
      if (!currentBooking) return;
      if (!confirm('Cancel booking ' + currentBooking.bookingId + '? This cannot be undone.')) return;
      google.script.run
        .withSuccessHandler(function(r) {
          if (r.success) {
            showToast('Booking cancelled successfully.', 'success');
            currentBooking.status = 'Cancelled';
            renderBooking(currentBooking);
          } else {
            showToast(r.message, 'error');
          }
        })
        .withFailureHandler(function(err) {
          showToast('Error: ' + err.message, 'error');
        })
        .cancelMyBooking(currentBooking.bookingId, currentBooking.email);
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showToast(msg, type) {
      var t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove(); }, 300); }, 5000);
    }
  </script>
</body>
</html>
