<div class="hero">
  <div class="logos">
    <img src="https://i.postimg.cc/WzPdKT2p/GS-logo-color-light-crop.png" alt="UniSZA Graduate School" style="height:48px">
  </div>
  <h1 class="title">UniSZA Graduate School · Meeting Room Booking</h1>
  <p class="subtitle">Sunday – Thursday · 08:00 – 17:00 · Book up to 60 days ahead</p>
</div>

<div id="userBannerWrap" style="text-align:right;margin-bottom:20px;padding-right:4px;display:none">
  <span class="user-banner">
    <span class="u-dot"></span>
    <span class="u-email" id="userEmailSpan"></span>
    <button class="u-change" onclick="changeGoogleUser()">Change user</button>
  </span>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  function initHeaderUser() {
    google.script.run
      .withSuccessHandler(function(email) {
        if (email) {
          showBanner(email);
          sessionStorage.setItem('gsUserEmail', email);
          if (typeof onUserIdentified === 'function') onUserIdentified(email);
        }
      })
      .getCurrentUser();

    google.script.run
      .withSuccessHandler(function(clientId) {
        if (clientId) initGoogleIdentity(clientId);
      })
      .getGoogleClientId();
  }

  function showBanner(email) {
    var wrap = document.getElementById('userBannerWrap');
    var span = document.getElementById('userEmailSpan');
    if (!wrap || !span) return;
    span.textContent = email;
    wrap.style.display = '';
  }

  function getStoredEmail() {
    return sessionStorage.getItem('gsUserEmail') || '';
  }

  function changeGoogleUser() {
    var current = getStoredEmail();
    sessionStorage.removeItem('gsUserEmail');
    document.getElementById('userBannerWrap').style.display = 'none';
    if (typeof google !== 'undefined' && google.accounts) {
      google.accounts.id.disableAutoSelect();
      if (current) {
        try { google.accounts.id.revoke(current, function() {}); } catch(e) {}
      }
      setTimeout(function() {
        try { google.accounts.id.prompt(); } catch(e) {}
      }, 300);
    }
  }

  function initGoogleIdentity(GCID) {
    if (!GCID) return;
    if (getStoredEmail()) return;
    try {
      google.accounts.id.initialize({
        client_id: GCID,
        callback: function (resp) {
          try {
            var payload = JSON.parse(atob(resp.credential.split('.')[1]));
            var email = payload.email;
            sessionStorage.setItem('gsUserEmail', email);
            showBanner(email);
            if (typeof onUserIdentified === 'function') onUserIdentified(email);
          } catch(e) {}
        },
        auto_select: true,
        cancel_on_tap_outside: false
      });
      google.accounts.id.prompt(function (notification) {
        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
          var wrap = document.getElementById('userBannerWrap');
          if (wrap && !getStoredEmail()) wrap.style.display = 'none';
        }
      });
    } catch(e) {}
  }

  document.addEventListener('DOMContentLoaded', initHeaderUser);
</script>
