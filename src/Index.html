<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('pages/_styles') ?>
  <style>
    .nav-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
    .nav-card { display: block; padding: 28px 24px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); text-decoration: none; color: var(--text); transition: .22s; text-align: center; cursor: pointer; }
    .nav-card:hover { border-color: var(--cyan); box-shadow: 0 0 24px rgba(0,240,255,.2); transform: translateY(-2px); }
    .nav-card .icon { font-size: 36px; margin-bottom: 10px; }
    .nav-card .label { font-weight: 700; font-size: 16px; letter-spacing: .3px; }
    .nav-card .desc { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .cal-embed-wrap { width: 100%; height: 520px; overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius); position: relative; }
    .cal-embed { width: 100%; height: 570px; border: none; margin-top: -50px; filter: invert(.92) hue-rotate(180deg); }
    .cal-label { font-size: 10px; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="container">
    <?!= include('pages/_header') ?>

    <? var u = getCurrentUser(); if (u) { ?>
    <div style="text-align:right;margin-top:-14px;margin-bottom:20px;padding-right:8px">
      <span class="user-banner">
        <span class="u-dot"></span>
        <span class="u-email"><?= u ?></span>
        <button class="u-change" onclick="changeUser()">Change user</button>
      </span>
    </div>
    <? } ?>

    <div class="card">
      <h2>Welcome — <span>IC Meeting Room</span></h2>
      <p class="text-muted mb-20">Select a page below:</p>
      <div class="nav-links">
        <div class="nav-card" onclick="navigateTo('booking')">
          <div class="icon">&#x1F4C5;</div>
          <div class="label">Book a Room</div>
          <div class="desc">Submit a new meeting room booking request</div>
        </div>
        <div class="nav-card" onclick="navigateTo('my')">
          <div class="icon">&#x1F50D;</div>
          <div class="label">My Bookings</div>
          <div class="desc">Look up or cancel your booking</div>
        </div>
        <div class="nav-card" onclick="navigateTo('admin')">
          <div class="icon">&#x2699;&#xFE0F;</div>
          <div class="label">Admin Panel</div>
          <div class="desc">Manage approvals (admin key required)</div>
        </div>
      </div>
      <p class="text-muted text-center mt-20" style="font-size:11px">Sunday – Thursday · 08:00 – 17:00 · Book up to 60 days ahead</p>
    </div>

    <div class="cal-label">IC Booking Schedule · Calendar</div>
    <div class="cal-embed-wrap"><iframe class="cal-embed" src="https://calendar.google.com/calendar/embed?src=Y184NTRmMTg3ZTVjYTA5MDFhZGE5NGE4YTQ1ZDVjNmMxNDViYzI5MGU4ODdkZDIxZTk1NzFjNmMwYzMzNDAwZWQwQGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&mode=MONTH&showTitle=0&showNav=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0" scrolling="no"></iframe></div>
  </div>

  <script>
    function navigateTo(page) {
      window.top.location.href = '<?!= getDeploymentUrl() ?>?page=' + page;
    }
    function changeUser() {
      window.top.location.href = 'https://accounts.google.com/AccountChooser?continue=' + encodeURIComponent('<?!= getDeploymentUrl() ?>');
    }
  </script>
</body>
</html>
